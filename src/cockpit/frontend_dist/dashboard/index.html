<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dashboard — LLM Cockpit</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { color-scheme: light dark; --border: #d0d0d0; --muted: #777; --warm: #2e7d32; --cold: #777; --warn: #b00020; --bg-card: #fafafa; }
    * { box-sizing: border-box; }
    body { font: 14px/1.5 -apple-system, system-ui, sans-serif; max-width: 1400px; margin: 1.5rem auto; padding: 0 1rem; }
    header { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; }
    h1 { font-size: 1.25rem; margin: 0; }
    .me { color: var(--muted); font-size: 0.875rem; }
    .me button { font: inherit; padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: transparent; }
    .status { padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; display: inline-block; }
    .status.healthy { background: #d4f1d4; color: #2e7d32; }
    .status.degraded { background: #fff4cc; color: #8a6d00; }
    .status.ollama_unreachable { background: #ffd5d5; color: var(--warn); }
    .gpu-strip { display: flex; gap: 1rem; flex-wrap: wrap; padding: 0.5rem 0 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .gpu { font-size: 0.875rem; padding: 0.4rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); min-width: 200px; }
    .gpu .bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 0.4rem; overflow: hidden; }
    .gpu .bar > span { display: block; height: 100%; background: linear-gradient(to right, #4caf50, #ff9800); }
    .empty { color: var(--muted); font-style: italic; }
    .columns { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; }
    .col { flex: 1 1 220px; min-width: 220px; border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; background: var(--bg-card); }
    .col h2 { font-size: 0.875rem; margin: 0 0 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
    .col.warm h2 { color: var(--warm); }
    .card { padding: 0.6rem; margin-bottom: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: white; font-size: 0.875rem; }
    .card .name { font-weight: 600; word-break: break-all; }
    .card .meta { color: var(--muted); margin-top: 0.25rem; }
    .card .metrics { color: var(--muted); margin-top: 0.25rem; font-family: ui-monospace, monospace; font-size: 0.75rem; }
    .card .actions { margin-top: 0.4rem; display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .card .actions button, .card .actions select { font: inherit; font-size: 0.75rem; padding: 0.2rem 0.45rem; border: 1px solid var(--border); border-radius: 4px; background: white; cursor: pointer; }
    .card .mismatch { color: var(--warn); font-size: 0.75rem; margin-top: 0.25rem; }
    dialog { border: 1px solid var(--border); border-radius: 6px; padding: 1rem; max-width: 600px; width: 90%; }
    dialog .stages { font-family: ui-monospace, monospace; font-size: 0.875rem; max-height: 300px; overflow-y: auto; padding: 0.5rem; background: #f5f5f5; border-radius: 4px; margin: 0.5rem 0; }
    dialog .stages > div { margin: 0.1rem 0; }
    dialog .stages .stage { color: #2e7d32; }
    dialog .stages .result { color: #1565c0; font-weight: 600; }
    dialog .stages .err { color: var(--warn); }
    p.note { color: var(--muted); font-size: 0.8125rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>LLM Cockpit — Dashboard</h1>
      <div class="me" id="me">Loading…</div>
    </div>
    <div>
      <span id="status" class="status">…</span>
      <button id="logout" type="button">Log out</button>
    </div>
  </header>

  <div class="gpu-strip" id="gpu-strip"></div>
  <div class="columns" id="columns"></div>

  <dialog id="perf-dialog">
    <h2 style="margin-top:0">Performance test</h2>
    <p id="perf-target" class="me"></p>
    <div class="stages" id="perf-stages"></div>
    <button id="perf-close" type="button">Close</button>
  </dialog>

  <p class="note">Sprint 3 placeholder UI. Sprint 4 replaces this with the real Next.js + dnd-kit shell. Drag-drop becomes a real interaction; this version uses a &lt;select&gt; for placement changes.</p>

  <script>
    const COLUMN_LABELS = {
      multi_gpu: 'Multi-GPU',
      on_demand: 'On Demand',
      available: 'Available',
    };
    const WARM_COLUMNS = new Set(['gpu0','gpu1','gpu2','gpu3','multi_gpu']);
    const state = { me: null, snapshot: null };

    async function loadMe() {
      const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
      if (r.status === 401) { window.location.replace('/login/'); return null; }
      if (r.status === 409) { window.location.replace('/change-password/'); return null; }
      if (!r.ok) return null;
      return r.json();
    }

    async function loadSnapshot() {
      const r = await fetch('/api/dashboard/snapshot', { credentials: 'same-origin' });
      if (r.status === 401) { window.location.replace('/login/'); return null; }
      if (r.status === 409) { window.location.replace('/change-password/'); return null; }
      if (!r.ok) return null;
      return r.json();
    }

    function startStream() {
      const es = new EventSource('/api/dashboard/stream', { withCredentials: true });
      es.addEventListener('snapshot', (ev) => {
        try {
          state.snapshot = JSON.parse(ev.data);
          render();
        } catch (_e) { /* malformed event; skip */ }
      });
      es.addEventListener('error', () => {
        // Browser auto-reconnects; if a 401 lands the cookie is gone — kick to login.
        // Don't loop on transient errors; we trust EventSource's backoff.
      });
      return es;
    }

    function fmtBytes(n) {
      if (n == null) return '?';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      if (n < 1024 ** 3) return (n / 1024 / 1024).toFixed(1) + ' MB';
      return (n / 1024 / 1024 / 1024).toFixed(1) + ' GB';
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderGpuStrip() {
      const el = document.getElementById('gpu-strip');
      if (!state.snapshot) { el.innerHTML = ''; return; }
      const gpus = state.snapshot.gpus || [];
      if (!gpus.length) {
        el.innerHTML = '<span class="empty">No GPU telemetry detected (Mac / CPU-only / nvidia-smi missing).</span>';
        return;
      }
      el.innerHTML = gpus.map((g) => {
        const used = g.vram_used_mb / 1024;
        const total = g.vram_total_mb / 1024;
        const pct = total > 0 ? (used / total) * 100 : 0;
        return `<div class="gpu">
          <strong>GPU ${g.index}</strong>
          ${used.toFixed(1)} / ${total.toFixed(1)} GB
          ${g.temp_c != null ? ' · ' + Math.round(g.temp_c) + '°C' : ''}
          ${g.power_w != null ? ' · ' + Math.round(g.power_w) + ' W' : ''}
          <div class="bar"><span style="width:${Math.min(100, pct)}%"></span></div>
        </div>`;
      }).join('');
    }

    function renderStatus() {
      const el = document.getElementById('status');
      const s = state.snapshot && state.snapshot.status || '…';
      el.textContent = (s === 'ollama_unreachable' ? 'Ollama unreachable' : s).replace(/_/g, ' ');
      el.className = 'status ' + s;
    }

    function renderColumns() {
      const el = document.getElementById('columns');
      if (!state.snapshot) { el.innerHTML = '<div class="empty">Loading…</div>'; return; }
      const columns = state.snapshot.columns || [];
      const models = state.snapshot.models || [];
      const isAdmin = state.me && state.me.role === 'admin';

      // Bucket models by their config.placement, falling back to "available".
      const buckets = Object.fromEntries(columns.map((c) => [c, []]));
      for (const m of models) {
        const p = (m.config && m.config.placement) || 'available';
        if (buckets[p]) buckets[p].push(m); else (buckets['available'] || (buckets['available'] = [])).push(m);
      }

      el.innerHTML = columns.map((col) => {
        const label = COLUMN_LABELS[col] || col.toUpperCase();
        const warm = WARM_COLUMNS.has(col);
        const cards = (buckets[col] || []).map((m) => renderCard(m, columns, isAdmin)).join('');
        return `<section class="col ${warm ? 'warm' : ''}">
          <h2>${escapeHtml(label)}</h2>
          ${cards || '<div class="empty">empty</div>'}
        </section>`;
      }).join('');

      // Wire admin actions.
      if (isAdmin) {
        el.querySelectorAll('.placement-select').forEach((sel) => {
          sel.addEventListener('change', onPlacementChange);
        });
        el.querySelectorAll('.delete-btn').forEach((btn) => {
          btn.addEventListener('click', onDelete);
        });
        el.querySelectorAll('.perf-btn').forEach((btn) => {
          btn.addEventListener('click', onPerfTest);
        });
      }
    }

    function renderCard(m, columns, isAdmin) {
      const placement = (m.config && m.config.placement) || 'available';
      const tag = m.tag || '—';
      const loaded = m.actual && m.actual.loaded;
      const perf = m.metrics;
      const mismatch = m.actual && m.actual.mismatch;

      let actions = '';
      if (isAdmin) {
        const opts = columns.map((c) => `<option value="${c}" ${c===placement?'selected':''}>${escapeHtml(COLUMN_LABELS[c] || c)}</option>`).join('');
        actions = `<div class="actions">
          <select class="placement-select" data-model="${escapeHtml(m.name)}">${opts}</select>
          <button type="button" class="perf-btn" data-model="${escapeHtml(m.name)}">Test performance</button>
          <button type="button" class="delete-btn" data-model="${escapeHtml(m.name)}">Delete</button>
        </div>`;
      }

      return `<article class="card">
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="meta">
          <span>tag: ${escapeHtml(tag)}</span>
          · <span>${fmtBytes(m.size_bytes)}</span>
          · <span>${loaded ? 'loaded' : 'idle'}</span>
        </div>
        ${mismatch ? `<div class="mismatch">Requested ${escapeHtml(placement)} · Ollama placed on GPU ${m.actual.main_gpu_actual}</div>` : ''}
        ${perf ? `<div class="metrics">
          ⏱ cold ${perf.cold_load_seconds != null ? perf.cold_load_seconds.toFixed(1) + ' s' : '—'} ·
          ⚡ ${perf.throughput_tps != null ? perf.throughput_tps.toFixed(1) + ' tps' : '—'} ·
          ${perf.max_ctx_observed != null ? perf.max_ctx_observed + ' ctx' : 'no ctx data'}
        </div>` : `<div class="metrics">no perf data — run "Test performance"</div>`}
        ${actions}
      </article>`;
    }

    async function onPlacementChange(ev) {
      const sel = ev.currentTarget;
      const model = sel.dataset.model;
      const placement = sel.value;
      sel.disabled = true;
      try {
        const r = await fetch(`/api/admin/ollama/models/${encodeURIComponent(model)}/place`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ placement }),
        });
        if (!r.ok) {
          alert(`Place failed: ${r.status}\n${await r.text()}`);
          // Revert visual state on the next snapshot tick.
          return;
        }
        // Refresh on the next stream tick; no need to manually refetch.
      } catch (e) {
        alert('Network error: ' + e);
      } finally {
        sel.disabled = false;
      }
    }

    async function onDelete(ev) {
      const model = ev.currentTarget.dataset.model;
      if (!window.confirm(`Delete ${model} from Ollama? The on-disk weights go away.`)) return;
      const r = await fetch(`/api/admin/ollama/models/${encodeURIComponent(model)}`, {
        method: 'DELETE',
        credentials: 'same-origin',
      });
      if (!r.ok && r.status !== 204) alert(`Delete failed: ${r.status}`);
    }

    function onPerfTest(ev) {
      const model = ev.currentTarget.dataset.model;
      const dialog = document.getElementById('perf-dialog');
      const target = document.getElementById('perf-target');
      const stages = document.getElementById('perf-stages');
      target.textContent = 'Model: ' + model;
      stages.innerHTML = '<div>Connecting…</div>';
      if (typeof dialog.showModal === 'function') dialog.showModal();
      else dialog.setAttribute('open', '');

      // SSE via fetch + ReadableStream (EventSource doesn't support POST).
      fetch(`/api/admin/ollama/models/${encodeURIComponent(model)}/perf-test`, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({}),
      }).then(async (r) => {
        if (!r.ok) {
          stages.innerHTML = `<div class="err">HTTP ${r.status}</div>`;
          return;
        }
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        stages.innerHTML = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buf.indexOf('\n\n')) !== -1) {
            const block = buf.slice(0, idx); buf = buf.slice(idx + 2);
            const lines = block.split('\n');
            let event = 'message', data = '';
            for (const line of lines) {
              if (line.startsWith('event:')) event = line.slice(6).trim();
              else if (line.startsWith('data:')) data += line.slice(5).trim();
            }
            const div = document.createElement('div');
            div.className = event;
            try {
              const parsed = JSON.parse(data);
              div.textContent = `[${event}] ${JSON.stringify(parsed)}`;
            } catch {
              div.textContent = `[${event}] ${data}`;
            }
            stages.appendChild(div);
            stages.scrollTop = stages.scrollHeight;
          }
        }
      }).catch((e) => {
        stages.innerHTML = `<div class="err">${escapeHtml(String(e))}</div>`;
      });
    }

    function render() {
      renderGpuStrip();
      renderStatus();
      renderColumns();
    }

    document.getElementById('logout').addEventListener('click', async () => {
      try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }); } catch (_e) {}
      window.location.replace('/login/');
    });
    document.getElementById('perf-close').addEventListener('click', () => {
      const dialog = document.getElementById('perf-dialog');
      if (typeof dialog.close === 'function') dialog.close();
      else dialog.removeAttribute('open');
    });

    (async () => {
      state.me = await loadMe();
      if (!state.me) return;
      document.getElementById('me').textContent =
        state.me.username + ' · ' + state.me.role;
      state.snapshot = await loadSnapshot();
      render();
      startStream();
    })();
  </script>
</body>
</html>
